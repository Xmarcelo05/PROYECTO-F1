server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Soporte para React Router / rutas SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos (Vite genera hashes en los nombres)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
