services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: pronosticos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pronosticos_user
      POSTGRES_PASSWORD: pronosticos_pass
      POSTGRES_DB: pronosticos_deportivos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pronosticos_user -d pronosticos_deportivos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: pronosticos_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
      pgdata: